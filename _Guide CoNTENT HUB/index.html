            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The statute of limitations varies by state and type of injury. Most states allow 2-3 years to file a personal injury lawsuit. Some states allow 1 year, while others allow 4-6 years. Missing your deadline means you lose your right to sue forever, regardless of how strong your case is."
            }
          },

            "@type": "Question",
            "name": "What should I do immediately after a car accident?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "In the first 72 hours after a car accident: (1) Seek medical attention, (2) Document the scene with photos and videos, (3) Get witness contact information, (4) Report to police, (5) Do not admit fault, (6) Preserve evidence. The first 72 hours are critical because traffic camera footage is typically deleted after this period."
            }
          },
          {
            "@type": "Question",
            "name": "How much does a personal injury case typically settle for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Settlement amounts vary widely based on injury severity, medical expenses, lost wages, and liability. Minor injuries may settle for $5,000-$25,000. Moderate injuries may settle for $25,000-$100,000. Severe injuries may settle for $100,000+. Each case is unique and depends on specific circumstances."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need a lawyer after a car accident?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You don't legally need a lawyer, but hiring one often increases your settlement. Insurance companies are skilled at minimizing payouts. An attorney can help you understand your rights, negotiate with insurance, and maximize your settlement. Most personal injury attorneys work on contingency, meaning you only pay if you win."
            }
