<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>CasePort — Request Private Access</title>
    <meta name="description" content="Request private access to CasePort's premium case acquisition system. A qualification flow for plaintiff-side personal injury law firms built for speed, operational discipline, and funded growth." />

    <!-- This is a private access page — not for public indexing -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://access.caseport.io" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://access.caseport.io" />
    <meta property="og:title" content="CasePort — Request Private Access" />
    <meta property="og:description" content="A qualification flow for plaintiff-side PI firms built for speed, operational discipline, and funded growth. Not all firms are accepted." />
    <meta property="og:site_name" content="CasePort" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@caseportio" />
    <meta name="twitter:title" content="CasePort — Request Private Access" />
    <meta name="twitter:description" content="A qualification flow for plaintiff-side PI firms built for speed, operational discipline, and funded growth. Not all firms are accepted." />

    <!-- JSON-LD: WebPage structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "CasePort — Request Private Access",
      "description": "A qualification flow for plaintiff-side personal injury law firms. CasePort is a case acquisition platform that connects pre-screened PI firms with qualified case opportunities.",
      "url": "https://access.caseport.io",
      "publisher": {
        "@type": "Organization",
        "name": "CasePort",
        "url": "https://caseport.io",
        "description": "CasePort is a case acquisition platform for plaintiff-side personal injury law firms. Not a law firm. No attorney-client relationships formed.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@caseport.io"
        }
      },
      "potentialAction": {
        "@type": "ApplyAction",
        "name": "Apply for Private Access",
        "target": "https://access.caseport.io"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
