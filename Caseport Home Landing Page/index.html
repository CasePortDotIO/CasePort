    <!-- ═══ SCHEMA.ORG — FAQ PAGE (AEO: voice search + featured snippets) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How is CasePort different from other lead generation companies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most lead gen companies sell you a list. They generate volume, blast it to multiple firms, and let you fight over scraps. CasePort is not a lead vendor. It is a case acquisition system built around qualification, routing, and retained value. We cap the number of firms per market, screen every opportunity before it reaches you, and maintain structured recovery protocols after delivery. The difference is structural, not incremental."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if the leads from CasePort do not convert?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CasePort does not sell leads. We deliver qualified case opportunities that have passed through a multi-layer screening process. Conversion depends on your firm's intake speed, follow-up discipline, and case selection. We provide full transparency into opportunity quality metrics and have structured recovery protocols designed to reduce preventable breakdowns after delivery."
          }
        },
        {
          "@type": "Question",
          "name": "How does CasePort qualify opportunities before routing them?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every opportunity passes through a 6-layer qualification framework — from initial intent signal through case-fit verification. We evaluate injury type, timing, liability indicators, geographic alignment, and firm capacity match. The goal is simple: your intake team should only see opportunities that fit. We would rather send you 10 qualified opportunities than 100 unqualified ones."
          }
        },
        {
          "@type": "Question",
          "name": "What does market-capped mean in legal lead generation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Market-capped means CasePort limits the number of partner firms per metropolitan area to a maximum of three. Hard cap. No exceptions. This structural decision protects lead quality and prevents the oversaturation that destroys ROI in every other lead gen model. If your market is full, you go on a waitlist."
          }
        },
        {
          "@type": "Question",
          "name": "Can I see the CasePort system before committing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "CasePort offers a structured review process, not a free trial. You apply, we evaluate fit, and if both sides align, we walk you through the system architecture, performance targets, and market availability before any commitment. We are selective because the model only works when both sides are serious."
          }
        },
        {
          "@type": "Question",
          "name": "Why should I trust a new lead generation company for personal injury?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You should evaluate CasePort based on structure, not promises. Our market-capped model means we have a financial incentive to make every partner successful because we cannot just replace you with the next firm. Our transparent reporting means you see everything. And our compliance-first design means we are not cutting corners to generate volume. Trust is earned through structure, not slogans."
          }
        },
        {
          "@type": "Question",
          "name": "How much does CasePort cost for personal injury leads?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pricing is discussed during the review process and varies based on market, case type, and volume tier. CasePort does not publish pricing because every market has different dynamics. If the ROI calculator on our website does not show numbers that make sense for your firm, we are probably not the right fit."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can I expect results from CasePort?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "System activation typically takes 2-3 weeks after approval. Initial qualified opportunities begin flowing within the first 30 days. However, building a controlled case acquisition pipeline is a compounding process. Firms that commit to the system for 90+ days see the strongest returns. This is infrastructure, not a quick fix."
          }
        }
      ]
    }
    </script>
