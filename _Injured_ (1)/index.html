    <div id="root"></div>

    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "CasePort",

      "description": "Premium case acquisition system for personal injury law firms",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["en"]
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Case Acquisition System",
      "description": "Connect injured claimants with vetted personal injury law firms",
      "provider": {
        "@type": "Organization",
        "name": "CasePort"
      },
      "areaServed": "US"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a case acquisition system?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A case acquisition system is a structured platform that connects injured claimants with vetted personal injury law firms using precision matching algorithms."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get connected to a lawyer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Call us or fill out a quick form. Our system matches you with the top 3 vetted firms in your area. One of those firms calls you within 2 minutes."
          }
        },
        {
          "@type": "Question",
          "name": "Is CasePort a law firm?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. CasePort is not a law firm. We are a case acquisition system that connects claimants with vetted personal injury law firms. We do not provide legal advice."

        }
